<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflex Circles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section id="start-screen" class="screen center active">
    <h1>Reflex Circles</h1>
    <p>Click each circle before it disappears, or press its matching letter. Misses cost health.</p>
    <button id="start-button" type="button">Start Game</button>
    <p class="small">Controls: mouse click or keys q w e / a s d / z x c. Heal +3 every 10 hits.</p>
  </section>

  <section id="game-screen" class="screen">
    <div id="hud">
      <div class="stat"><div class="label">Score</div><div id="score" class="value">0</div></div>
      <div class="stat"><div class="label">Combo</div><div id="combo" class="value">0</div></div>
      <div class="stat"><div class="label">Max Combo</div><div id="max-combo" class="value">0</div></div>
      <div id="health-wrapper" role="progressbar" aria-label="Health" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100"><div id="health-bar"></div></div>
      <div class="stat"><div class="label">Spawn</div><div id="spawn-ms" class="value">-- ms</div></div>
      <div class="stat"><div class="label">Lifetime</div><div id="life-ms" class="value">-- ms</div></div>
    </div>
    <div id="game-area"></div>
  </section>

  <section id="game-over-screen" class="screen center">
    <h1>Game Over</h1>
    <div id="final-score" class="value">Score: 0</div>
    <div id="max-combo-out" class="value">Max Combo: 0</div>
    <button id="restart-button" type="button">Restart</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
